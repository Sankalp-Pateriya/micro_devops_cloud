spring:
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8079}
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      server:
        webflux:
         discovery:
           locator:
             enabled: false
             lower-case-service-id: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: READ_ONLY

  application:
    name: API-GATEWAY

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}


  instance:
    preferIpAddress: true

